<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PolyFarm</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    :root {
      --paper: #ffffff;
      --wash: #f4faf6;
      --mist: #eaf6ef;
      --mint: #dff4e8;
      --line: #d5e8dc;
      --ink: #10251a;
      --muted: #617468;
      --leaf: #0d6b50;
      --leaf-2: #085041;
      --leaf-3: #134f34;
      --yellow: #fff7d7;
      --yellow-line: #ead680;
      --orange: #fff0df;
      --orange-line: #e5aa70;
      --red: #fff0f0;
      --red-line: #e3a0a0;
      --shadow: 0 18px 48px rgba(8, 80, 65, .14);
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      background:
        linear-gradient(90deg, rgba(13, 107, 80, .045) 1px, transparent 1px),
        linear-gradient(rgba(13, 107, 80, .045) 1px, transparent 1px),
        #edf6f0;
      background-size: 28px 28px;
      color: var(--ink);
      font-family: Avenir Next, Manrope, ui-rounded, system-ui, sans-serif;
    }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    .phone {
      width: min(100%, 430px);
      min-height: 100vh;
      background: var(--wash);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      position: relative;
    }
    @media (min-width: 760px) {
      body { padding: 22px; align-items: flex-start; }
      .phone { min-height: calc(100vh - 44px); border: 1px solid var(--line); border-radius: 28px; overflow: hidden; }
    }
    .statusbar {
      height: 38px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--paper);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      flex: 0 0 auto;
    }
    .mqtt-dot { width: 7px; height: 7px; border-radius: 99px; background: #e7b949; display: inline-block; margin-right: 5px; }
    .mqtt-dot.ok { background: #18a66f; }
    .mqtt-dot.err { background: #d84949; }
    .scr { flex: 1; overflow: auto; }
    .scr::-webkit-scrollbar { width: 4px; }
    .scr::-webkit-scrollbar-thumb { background: #b9d8c5; border-radius: 999px; }
    .top {
      background: var(--paper);
      padding: 18px 20px 16px;
      border-bottom: 1px solid var(--line);
    }
    .step { color: var(--leaf); font-size: 12px; font-weight: 800; margin-bottom: 5px; }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 30px; line-height: .98; letter-spacing: -.8px; }
    h2 { font-size: 23px; line-height: 1.05; letter-spacing: -.5px; }
    h3 { font-size: 19px; letter-spacing: -.35px; }
    .sub { color: var(--muted); margin-top: 7px; font-size: 14px; line-height: 1.45; }
    .section { padding: 16px 20px 24px; }
    .stack { display: grid; gap: 12px; }
    .grid2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
    }
    .soft { background: var(--mist); }
    .field { display: grid; gap: 7px; }
    .field label { color: var(--leaf-2); font-size: 12px; font-weight: 800; }
    .input {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--paper);
      border-radius: var(--radius);
      padding: 13px 12px;
      outline: none;
      color: var(--ink);
      font-size: 15px;
    }
    .input:focus { border-color: var(--leaf); box-shadow: 0 0 0 3px rgba(13, 107, 80, .12); }
    .btn {
      width: 100%;
      border: 1px solid var(--leaf-2);
      background: var(--leaf-2);
      color: #effbf4;
      border-radius: var(--radius);
      min-height: 48px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 850;
    }
    .btn.secondary { background: var(--mist); color: var(--leaf-2); border-color: var(--line); }
    .btn.ghost { background: var(--paper); color: var(--leaf-2); border-color: var(--line); }
    .btn:disabled { background: #edf1ee; color: #9aa89f; border-color: #edf1ee; cursor: default; }
    .crop-card {
      min-height: 136px;
      text-align: left;
      border: 1px solid var(--line);
      background: var(--paper);
      border-radius: var(--radius);
      padding: 14px;
      position: relative;
      overflow: hidden;
    }
    .crop-card.selected {
      background: #dff5e8;
      border: 2px solid var(--leaf);
      padding: 13px;
    }
    .crop-visual {
      position: absolute;
      right: -8px;
      top: -16px;
      font-size: 76px;
      opacity: .16;
      transform: rotate(-8deg);
      line-height: 1;
    }
    .crop-icon {
      width: 42px;
      height: 42px;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      background: #edf8f1;
      font-size: 25px;
      margin-bottom: 26px;
      position: relative;
      z-index: 1;
    }
    .crop-card h3 { position: relative; z-index: 1; font-size: 22px; }
    .crop-card p { position: relative; z-index: 1; margin-top: 4px; color: var(--muted); font-weight: 650; }
    .sci { font-size: 11px; color: #829288; margin-top: 7px; line-height: 1.25; }
    .num-control {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) 42px;
      gap: 8px;
      align-items: center;
    }
    .stepper {
      border: 1px solid var(--line);
      background: var(--mist);
      color: var(--leaf-2);
      border-radius: var(--radius);
      height: 42px;
      font-size: 22px;
      font-weight: 800;
    }
    .bed-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; }
    .bed-tab {
      min-width: 58px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 9px 12px;
      background: var(--paper);
      color: var(--muted);
      font-weight: 800;
    }
    .bed-tab.active { background: var(--leaf-2); color: white; border-color: var(--leaf-2); }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 999px;
      padding: 5px 9px;
      background: var(--mist);
      color: var(--leaf-2);
      font-size: 12px;
      font-weight: 800;
    }
    .metric-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .metric {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      background: var(--paper);
      position: relative;
      overflow: hidden;
    }
    .metric::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 5px;
      background: linear-gradient(90deg, var(--leaf) var(--pct, 0%), transparent 0);
      opacity: .78;
    }
    .metric.gauge {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 10px;
      align-items: center;
      min-height: 82px;
    }
    .meter-ring {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(var(--tone, var(--leaf)) var(--pct, 0%), #e5f0e9 0);
    }
    .meter-ring::after {
      content: "";
      width: 27px;
      height: 27px;
      border-radius: inherit;
      background: var(--paper);
      border: 1px solid rgba(13, 107, 80, .08);
    }
    .metric strong { display: block; font-size: 19px; letter-spacing: -.4px; }
    .metric span { display: block; margin-top: 3px; color: var(--muted); font-size: 11px; font-weight: 700; }
    .bed-metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }
    .bed-metric {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.72);
      padding: 9px;
      position: relative;
      overflow: hidden;
      min-height: 62px;
    }
    .bed-metric::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 5px;
      background: var(--tone, var(--leaf));
    }
    .bed-metric::after {
      content: "";
      position: absolute;
      left: 5px;
      right: 0;
      bottom: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--tone, var(--leaf)) var(--pct, 0%), transparent 0);
      opacity: .75;
    }
    .bed-metric b { display: block; font-size: 16px; letter-spacing: -.3px; color: var(--ink); }
    .bed-metric span { display: block; margin-top: 4px; color: var(--muted); font-size: 10px; font-weight: 850; }
    .band-white { background: var(--paper); border-color: var(--line); color: var(--leaf-2); }
    .band-yellow { background: var(--yellow); border-color: var(--yellow-line); color: #76580a; }
    .band-orange { background: var(--orange); border-color: var(--orange-line); color: #85460f; }
    .band-red { background: var(--red); border-color: var(--red-line); color: #8b2525; }
    .scan-ring {
      width: 124px;
      height: 124px;
      border-radius: 999px;
      margin: 12px auto 18px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, var(--mint) 0 34%, transparent 35%),
        conic-gradient(var(--leaf) var(--scan), #dcece2 0);
    }
    .scan-ring span {
      width: 76px;
      height: 76px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--paper);
      color: var(--leaf-2);
      font-size: 30px;
    }
    .progress {
      height: 7px;
      border-radius: 999px;
      background: #e4eee8;
      overflow: hidden;
    }
    .progress span { display: block; height: 100%; background: var(--leaf); width: var(--w); border-radius: inherit; transition: width .25s ease; }
    .comp-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      padding: 14px;
      position: relative;
      overflow: hidden;
    }
    .comp-card.selected { border: 2px solid var(--leaf); padding: 13px; }
    .comp-head { display: grid; grid-template-columns: 58px 1fr auto; gap: 12px; align-items: center; }
    .comp-icon {
      width: 58px;
      height: 58px;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      background: var(--mist);
      font-size: 30px;
    }
    .match { color: var(--leaf-2); font-size: 25px; font-weight: 900; letter-spacing: -.7px; }
    .detail { color: var(--muted); font-size: 13px; line-height: 1.45; margin-top: 10px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    .tiny-box {
      border: 1px solid var(--line);
      background: var(--wash);
      border-radius: var(--radius);
      padding: 9px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.35;
    }
    .tiny-box b { color: var(--ink); display: block; margin-bottom: 2px; }
    .layout-wrap {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(#fbfffc, #edf8f1);
      padding: 12px;
      overflow: auto;
    }
    .layout {
      position: relative;
      width: var(--layout-w);
      min-width: 220px;
      height: var(--layout-h);
      min-height: 260px;
      margin: auto;
      border: 2px solid var(--leaf-2);
      background:
        linear-gradient(90deg, rgba(13, 107, 80, .08) 1px, transparent 1px),
        linear-gradient(rgba(13, 107, 80, .08) 1px, transparent 1px),
        #f8fff9;
      background-size: var(--cell-x) var(--cell-y);
      border-radius: var(--radius);
    }
    .plant-dot {
      position: absolute;
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      font-size: 15px;
      background: white;
      border: 1px solid rgba(8, 80, 65, .25);
    }
    .plant-dot.comp { width: 14px; height: 14px; font-size: 12px; background: #e7f7ed; }
    .plant-dot.refugia { width: 15px; height: 15px; font-size: 12px; background: #fff5de; }
    .spacing-guide {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(#ffffff, #f2fbf5);
      padding: 12px;
      overflow: hidden;
    }
    .spacing-guide-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .spacing-guide-head strong { color: var(--leaf-2); font-size: 14px; }
    .spacing-guide-head span { display: block; color: var(--muted); font-size: 11px; font-weight: 800; margin-top: 2px; }
    .guide-arrow {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: var(--mist);
      color: var(--leaf-2);
      font-size: 18px;
      font-weight: 900;
    }
    .guide-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin: 8px 0 10px;
    }
    .guide-tab {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--paper);
      color: var(--muted);
      padding: 7px 5px;
      font-size: 10px;
      font-weight: 900;
    }
    .guide-tab.active {
      background: var(--leaf-2);
      border-color: var(--leaf-2);
      color: white;
    }
    .spacing-stage {
      position: relative;
      height: 178px;
      border: 1px solid #cde4d5;
      border-radius: var(--radius);
      background: #fbfffc;
    }
    .guide-grid-line {
      position: absolute;
      background: rgba(13, 107, 80, .1);
      z-index: 0;
    }
    .guide-grid-line.v { top: 0; bottom: 0; width: 1px; }
    .guide-grid-line.h { left: 0; right: 0; height: 1px; }
    .spacing-dot {
      position: absolute;
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      z-index: 3;
    }
    .spacing-line {
      position: absolute;
      background: var(--leaf-2);
      opacity: .72;
      z-index: 2;
    }
    .spacing-line.h { height: 2px; transform: translateY(-50%); }
    .spacing-line.v { width: 2px; transform: translateX(-50%); }
    .spacing-line::before,
    .spacing-line::after {
      content: "";
      position: absolute;
      width: 7px;
      height: 7px;
      border-top: 2px solid var(--leaf-2);
      border-right: 2px solid var(--leaf-2);
    }
    .spacing-line.h::before { left: -2px; top: -3px; transform: rotate(-135deg); }
    .spacing-line.h::after { right: -2px; top: -3px; transform: rotate(45deg); }
    .spacing-line.v::before { top: -2px; left: -3px; transform: rotate(-45deg); }
    .spacing-line.v::after { bottom: -2px; left: -3px; transform: rotate(135deg); }
    .spacing-label {
      position: absolute;
      padding: 3px 7px;
      border-radius: 999px;
      background: var(--paper);
      border: 1px solid var(--line);
      color: var(--leaf-2);
      font-size: 10px;
      font-weight: 900;
      white-space: nowrap;
      box-shadow: 0 4px 12px rgba(8, 80, 65, .07);
      transform: translate(-50%, -50%);
      z-index: 4;
    }
    .companion-strip {
      position: absolute;
      border: 1px dashed rgba(8, 80, 65, .45);
      background: rgba(223, 244, 232, .65);
      border-radius: 6px;
      z-index: 1;
    }
    .guide-caption {
      margin-top: 9px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
      font-weight: 760;
    }
    .field-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
    }
    .field-tab {
      min-width: 116px;
      border: 1px solid var(--line);
      background: var(--paper);
      color: var(--muted);
      border-radius: var(--radius);
      padding: 10px;
      text-align: left;
    }
    .field-tab.active {
      border-color: var(--leaf);
      background: var(--mist);
      color: var(--leaf-2);
    }
    .field-tab strong { display: block; font-size: 13px; }
    .field-tab span { display: block; margin-top: 2px; font-size: 11px; font-weight: 700; }
    .demo-strip {
      border: 1px solid rgba(159, 225, 203, .52);
      background: linear-gradient(135deg, #0a5d49, #0d6b50);
      color: #effbf4;
      border-radius: var(--radius);
      padding: 13px;
      display: grid;
      gap: 9px;
    }
    .demo-strip p { color: #bfead9; font-size: 13px; line-height: 1.42; }
    .segmented {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 5px;
      background: var(--mist);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }
    .segment {
      border: 0;
      border-radius: 6px;
      padding: 9px 6px;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }
    .segment.active { background: var(--paper); color: var(--leaf-2); box-shadow: 0 3px 12px rgba(8, 80, 65, .08); }
    .segment.mini { padding: 7px 5px; font-size: 11px; }
    .danger-btn {
      border: 1px solid var(--red-line);
      background: var(--red);
      color: #8b2525;
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 900;
    }
    .danger-btn:disabled { opacity: .45; cursor: default; }
    .scale-stage {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      grid-template-rows: auto 30px;
      gap: 7px;
      align-items: stretch;
    }
    .scale-left {
      grid-column: 1;
      grid-row: 1;
      position: relative;
      border-right: 1px solid #9bbcab;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
    }
    .scale-left span:first-child { position: absolute; top: 0; right: 7px; }
    .scale-left span:last-child { position: absolute; bottom: 0; right: 7px; }
    .scale-bottom {
      grid-column: 2;
      grid-row: 2;
      position: relative;
      border-top: 1px solid #9bbcab;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
    }
    .scale-bottom span:first-child { position: absolute; left: 0; top: 6px; }
    .scale-bottom span:last-child { position: absolute; right: 0; top: 6px; }
    .shape {
      display: inline-block;
      width: var(--s, 14px);
      height: var(--s, 14px);
      background: var(--c, var(--leaf));
      border: 1px solid rgba(8, 80, 65, .28);
      box-shadow: 0 0 0 2px rgba(255,255,255,.72);
    }
    .shape.circle { border-radius: 50%; }
    .shape.square { border-radius: 3px; }
    .shape.diamond { border-radius: 2px; transform: rotate(45deg); }
    .shape.triangle {
      width: 0;
      height: 0;
      background: transparent;
      border-left: calc(var(--s, 14px) / 2) solid transparent;
      border-right: calc(var(--s, 14px) / 2) solid transparent;
      border-bottom: var(--s, 14px) solid var(--c, var(--leaf));
      box-shadow: none;
    }
    .plant-dot.shape-dot {
      background: transparent;
      border: 0;
      box-shadow: none;
    }
    .legend { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
    .bottom-nav {
      display: none;
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, .96);
      backdrop-filter: blur(12px);
      padding: 7px 6px 12px;
      flex: 0 0 auto;
    }
    .bottom-nav.show { display: flex; }
    .nav-btn {
      flex: 1;
      border: 0;
      background: transparent;
      color: #8a9a90;
      display: grid;
      place-items: center;
      gap: 2px;
      padding: 5px 2px;
      font-size: 10px;
      font-weight: 800;
    }
    .nav-btn .ico { font-size: 20px; }
    .nav-btn.active { color: var(--leaf-2); }
    .login {
      min-height: 100%;
      display: grid;
      align-content: center;
      padding: 34px 24px;
      background:
        linear-gradient(155deg, rgba(223, 244, 232, .18), transparent 45%),
        var(--leaf-2);
      color: white;
    }
    .logo-mark {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, .12);
      border: 1px solid rgba(255, 255, 255, .2);
      border-radius: var(--radius);
      font-size: 32px;
      margin-bottom: 14px;
    }
    .login h1 { font-size: 42px; color: white; }
    .login .sub { color: #9fe1cb; }
    .login .input { background: rgba(255, 255, 255, .1); border-color: rgba(255, 255, 255, .24); color: white; }
    .login .input::placeholder { color: rgba(255,255,255,.62); }
    .login .btn { margin-top: 12px; background: #9fe1cb; border-color: #9fe1cb; color: var(--leaf-2); }
    @media (min-width: 900px) {
      .phone { width: min(100%, 980px); }
      .scr { background: var(--wash); }
      .top, .section { max-width: 760px; margin: 0 auto; width: 100%; }
      .top { margin-top: 0; }
      .login { min-height: calc(100vh - 82px); padding-inline: calc((100% - 460px) / 2); }
      .dashboard-grid { display: grid; grid-template-columns: 1.15fr .85fr; gap: 14px; align-items: start; }
      .layout { min-width: 340px; min-height: 360px; }
    }
  </style>
</head>
<body>
  <main class="phone">
    <div class="statusbar">
      <span id="clock">9:41</span>

      buncis:{n:'Buncis', common:'Bean', kind:'Legume companion', visual:'🫘', spacing:[20,40], ph:[6,7], temp:[18,25], note:'Adds nitrogen and uses a different canopy layer.', detail:'Works as a light companion when trellised carefully.', caution:'Keep away from garlic-heavy sections.'},
      zinnia:{n:'Zinnia', common:'Zinnia', kind:'Refugia', visual:'🌸', spacing:[30,30], ph:[5.5,7.5], temp:[20,32], note:'Attracts pollinators and syrphid flies.', detail:'Colorful refugia patch for predator support.', caution:'Needs airflow to prevent mildew.'},
      kacang_panjang:{n:'Kacang Panjang', common:'Yardlong bean', kind:'Legume companion', visual:'🫛', spacing:[25,75], ph:[5.5,6.5], temp:[25,35], note:'Fixes nitrogen and can use corn as structure.', detail:'Classic vertical layer for corn polyculture.', caution:'Needs support and regular harvest.'},
      bunga_matahari:{n:'Bunga Matahari', common:'Sunflower', kind:'Refugia', visual:'🌻', spacing:[60,60], ph:[6,7.5], temp:[20,32], note:'Attracts bees and natural predators.', detail:'Use as perimeter marker and wind cue.', caution:'Can shade small crops if placed inside rows.'},
      calopogonium:{n:'Calopogonium', common:'Calopo', kind:'LCC', visual:'☘️', spacing:[40,40], ph:[5,6.5], temp:[24,32], note:'Living cover crop for weed suppression.', detail:'Low cover for larger bed systems.', caution:'Control spread near young seedlings.'},
      kenikir:{n:'Kenikir', common:'Cosmos', kind:'Refugia', visual:'🌺', spacing:[40,40], ph:[5.5,7], temp:[22,32], note:'Attracts predators for aphids and leafhoppers.', detail:'Good edge refugia in warm beds.', caution:'Prune before it dominates edges.'},

      sereh:{n:'Sereh Dapur', common:'Lemongrass', kind:'Repellent', visual:'🌾', spacing:[50,50], ph:[5.5,7.5], temp:[24,32], note:'Aromatic edge plant that helps confuse pests.', detail:'Use on corners or borders rather than between tight rows.', caution:'Clumps get large over time.'},
      kedelai_sela:{n:'Kedelai', common:'Soybean intercrop', kind:'Legume companion', visual:'🌱', spacing:[40,15], ph:[6,6.5], temp:[25,30], note:'Tumpang sari rendah untuk menambah nitrogen.', detail:'Fits below cassava while light is available.', caution:'pH needs are narrower than cassava.'},
      arachis:{n:'Arachis pintoi', common:'Pinto peanut', kind:'Ground cover', visual:'🍀', spacing:[40,40], ph:[5.5,7], temp:[22,32], note:'Perennial living mulch and erosion control.', detail:'Strong choice below coconut or cassava.', caution:'Needs establishment time.'},
      mucuna:{n:'Mucuna bracteata', common:'Mucuna', kind:'LCC', visual:'🌿', spacing:[100,100], ph:[5,6.5], temp:[24,32], note:'Large living cover for plantations.', detail:'Excellent for coconut spacing and soil cover.', caution:'Too vigorous for small vegetable beds.'},
      selada:{n:'Selada', common:'Lettuce', kind:'Sela crop', visual:'🥬', spacing:[20,20], ph:[6,7], temp:[15,25], note:'Fast harvest filler; shades bare soil.', detail:'Best in early tomato growth or cooler sections.', caution:'Bolts under high heat.'},
      jagung_sela:{n:'Jagung', common:'Corn strip', kind:'Structure crop', visual:'🌽', spacing:[75,20], ph:[5.5,7.5], temp:[25,33], note:'Adds vertical structure and canopy diversity.', detail:'Use in strips beside soybean, not as a dense mix.', caution:'Can outcompete if planted too close.'},
      kubis:{n:'Kubis', common:'Cabbage', kind:'Between-row crop', visual:'🥬', spacing:[40,50], ph:[5.5,6.5], temp:[15,20], note:'Compact leaf crop for between-row placement where shade is controlled.', detail:'Place between soybean rows when airflow is good and harvest timing is short.', caution:'Needs cooler sections and steady moisture.'},
      krokot:{n:'Krokot Gelang', common:'Purslane', kind:'Ground cover', visual:'🌿', spacing:[20,20], ph:[5.5,7], temp:[25,35], note:'Heat-tolerant soil cover and mineral accumulator.', detail:'Keeps bare soil shaded in hot beds.', caution:'Can spread quickly.'},

      torenia:{n:'Torenia', common:'Wishbone flower', kind:'Refugia', visual:'🌷', spacing:[20,20], ph:[5.5,6.5], temp:[20,28], note:'Small flowering refugia for shaded humid areas.', detail:'Good near talas where taller flowers struggle.', caution:'Needs moist soil.'}
    };

    const live = {temp_air:26, hum_air:65, hum_soil:48, ph_soil:6.4, lat:null, long:null, ts:null};
    const seedFields = [
      {
        name:'Field A',
        crop:'tomat',
        target:180,
        layoutMode:'edge',
        chosen:{},
        placements:{},
        beds:[
          {id:'A1', length:7, width:1.2, ph:6.2, moisture:48, lat:-6.2001, lng:106.8171},
          {id:'A2', length:7, width:1.2, ph:5.6, moisture:42, lat:-6.2003, lng:106.8173}
        ]
      },
      {
        name:'Soybean Demo',
        crop:'kedelai',
        target:7.2,
        layoutMode:'perimeter',
        chosen:{A1:'jagung_sela'},
        placements:{A1:'perimeter'},
        beds:[
          {id:'A1', length:7.5, width:1.6, ph:6.2, moisture:52, lat:-6.2012, lng:106.8184}
        ]
      }
    ];
    const st = {
      screen:'login',
      tab:'dashboard',
      fields: JSON.parse(JSON.stringify(seedFields)),
      activeField:0,
      fieldName:'Field A',
      crop:'tomat',
      target:180,
      layoutMode:'edge',
      q:'',
      setupBed:0,
      scanned:0,
      activeBed:'A1',
      guideStep:0,
      chosen:{},
      placements:{},
      beds:[
        {id:'A1', length:7, width:1.2, ph:6.2, moisture:48, lat:-6.2001, lng:106.8171},
        {id:'A2', length:7, width:1.2, ph:5.6, moisture:42, lat:-6.2003, lng:106.8173}
      ]
    };

    function saveField() {
      st.fields[st.activeField] = {
        name: st.fieldName,
        crop: st.crop,
        target: st.target,
        layoutMode: st.layoutMode,
        chosen: {...st.chosen},
        placements: {...st.placements},
        beds: st.beds.map(b => ({...b}))
      };
    }
    function loadField(index) {
      saveField();
      st.activeField = clamp(index, 0, st.fields.length - 1);
      const f = st.fields[st.activeField];
      st.fieldName = f.name;
      st.crop = f.crop;
      st.target = f.target;
      st.layoutMode = f.layoutMode || 'edge';
      st.chosen = {...(f.chosen || {})};
      st.placements = {...(f.placements || {})};
      st.beds = f.beds.map(b => ({...b}));
      st.setupBed = 0;
      st.q = '';
      st.activeBed = st.beds[0]?.id || 'A1';
      render();
    }
    function createField() {
      saveField();
      const n = st.fields.length + 1;
      st.fields.push({
        name:`Field ${String.fromCharCode(64 + n)}`,
        crop:'cabai',
        target:60,
        layoutMode:'edge',
        chosen:{},
        placements:{},
        beds:[{id:'A1', length:7, width:1.2, ph:6.1, moisture:46, lat:-6.2005, lng:106.8175}]
      });
      loadField(st.fields.length - 1);
    }
    function removeField() {
      if (st.fields.length <= 1) return;
      const removed = st.activeField;
      st.fields.splice(removed, 1);
      st.activeField = clamp(removed - 1, 0, st.fields.length - 1);
      const f = st.fields[st.activeField];
      st.fieldName = f.name;
      st.crop = f.crop;
      st.target = f.target;
      st.layoutMode = f.layoutMode || 'edge';
      st.chosen = {...(f.chosen || {})};
      st.placements = {...(f.placements || {})};
      st.beds = f.beds.map(b => ({...b}));
      st.setupBed = 0;
      st.activeBed = st.beds[0]?.id || 'A1';
      render();
    }
    function startDemo() {
      saveField();
      const demo = JSON.parse(JSON.stringify(seedFields[1]));
      const existing = st.fields.findIndex(f => f.name === demo.name);
      if (existing >= 0) st.fields[existing] = demo;
      else st.fields.push(demo);
      loadField(existing >= 0 ? existing : st.fields.length - 1);
      st.screen = 'field';
      render();
    }
    function fieldTabs() {
      return `<div class="field-tabs">
        ${st.fields.map((f, i) => {
          const c = crops.find(x => x.id === f.crop) || crops[0];
          return `<button class="field-tab ${i===st.activeField?'active':''}" onclick="loadField(${i})"><strong>${f.name}</strong><span>${c.common} · ${f.beds.length} bed</span></button>`;
        }).join('')}
        <button class="field-tab" onclick="createField()"><strong>+ New field</strong><span>another crop type</span></button>
      </div>`;
    }
    function crop() { return crops.find(x => x.id === st.crop) || crops[0]; }
    function clamp(v, min, max) { return Math.min(Math.max(v, min), max); }
    function num(v, fallback) { const n = Number(String(v).replace(',', '.')); return Number.isFinite(n) ? n : fallback; }
    function fmt(v, d=0) { return new Intl.NumberFormat('id-ID', {maximumFractionDigits:d}).format(v); }
    function fmtPlain(v, d=2) { return Number(v).toFixed(d).replace(/\.?0+$/, ''); }
    function fmtPh(v) { return (Math.round(Number(v) * 10) / 10).toFixed(1).replace(/\.0$/, ''); }
    function fmtRange(r) { return `${fmtPh(r[0])}-${fmtPh(r[1])}`; }
    function bedArea(b) { return b.length * b.width; }
    function totalArea() { return st.beds.reduce((a,b) => a + bedArea(b), 0) || 1; }
    function bedShare(b) { return bedArea(b) / totalArea(); }
    function selectedCompanion(b) { return st.chosen[b.id] || crop().companions[0]; }
    function suggestedPlacement(id) {
      if (['jagung_sela','bunga_matahari','sereh','marigold'].includes(id)) return 'perimeter';
      if (['kubis','selada','bayam','buncis','kacang_panjang'].includes(id)) return 'between';
      return 'edge';
    }
    function selectedPlacement(b) { return st.placements[b.id] || suggestedPlacement(selectedCompanion(b)) || st.layoutMode; }
    function placementLabel(mode) {
      return mode === 'perimeter' ? 'Perimeter' : mode === 'between' ? 'Between rows' : 'Side rows';
    }
    function chooseCompanion(bid, id) {
      st.chosen[bid] = id;
      st.placements[bid] = suggestedPlacement(id);
      saveField();
      render();
    }
    function setCompanionPlacement(bid, mode) {
      st.placements[bid] = mode;
      saveField();
      render();
    }
    function bedCoord(b, index = 0) {
      const lat = b.lat ?? live.lat ?? (-6.2 - index * .0002);
      const lng = b.lng ?? live.long ?? (106.817 + index * .0002);
      return {lat, lng};
    }

    function rangeScore(value, range, soft, hard) {
      const gap = Math.max(range[0] - value, value - range[1], 0);
      if (gap <= soft) return 100;
      if (gap >= hard) return 35;
      return Math.round(100 - ((gap - soft) / (hard - soft)) * 55);
    }
    function band(score) {
      if (score >= 82) return {cls:'band-white', label:'Good'};
      if (score >= 70) return {cls:'band-yellow', label:'Watch'};
      if (score >= 55) return {cls:'band-orange', label:'Caution'};
      return {cls:'band-red', label:'High risk'};
    }
    function calcBed(b) {
      const c = crop();
      const [sx, sy] = c.spacing;
      const naturalCols = Math.max(1, Math.floor((b.width * 100) / sx));
      const naturalRows = Math.max(1, Math.floor((b.length * 100) / sy));
      const naturalCount = naturalCols * naturalRows;
      const bedTargetKg = st.target * bedShare(b);
      const neededPlants = Math.max(1, Math.ceil(bedTargetKg / c.yield));
      const pressure = Math.sqrt(naturalCount / neededPlants);
      const spacingFactor = clamp(pressure, .58, 1.18);
      const actualX = Math.max(10, Math.round(sx * spacingFactor));
      const actualY = Math.max(10, Math.round(sy * spacingFactor));
      const cols = Math.max(1, Math.floor((b.width * 100) / actualX));
      const rows = Math.max(1, Math.floor((b.length * 100) / actualY));
      const count = cols * rows;
      const yieldKg = count * c.yield;
      const densityLoss = Math.max(0, .82 - spacingFactor);
      const quality = clamp(Math.round(100 - densityLoss * 140), 45, 100);
      const phScore = rangeScore(b.ph, c.ph, .12, .8);
      const tempScore = rangeScore(live.temp_air, c.temp, 1.5, 6);
      const moistureScore = rangeScore(b.moisture, [40, 82], 4, 18);
      const env = Math.round(phScore * .45 + tempScore * .3 + moistureScore * .25);
      return {c, sx, sy, actualX, actualY, naturalCount, neededPlants, bedTargetKg, cols, rows, count, yieldKg, quality, env, phScore, tempScore, moistureScore, spacingFactor};
    }
    function planNote(p) {
      const q = band(p.quality);
      const e = band(p.env);
      if (q.label === 'High risk') return 'Target is forcing a very dense plan. Add bed area or reduce target to protect plant quality.';
      if (q.label === 'Caution') return 'Spacing is meaningfully tighter than the crop recommendation. This is usable, but monitor airflow and vigor.';
      if (e.label === 'High risk') return 'Soil or surrounding condition is far outside the recommended crop range.';
      if (e.label === 'Caution') return 'Environment needs correction before planting for best result.';
      if (q.label === 'Watch' || e.label === 'Watch') return 'Within watch range. No alarm yet, just keep an eye on this bed.';
      return 'Recommendation is inside the relaxed safety margin.';
    }
    function matchFor(comp, b, index) {
      const p = calcBed(b);
      const ph = rangeScore(b.ph, comp.ph || crop().ph, .18, .9);
      const temp = rangeScore(live.temp_air, comp.temp || crop().temp, 2, 7);
      const role = comp.kind.includes('Refugia') ? 4 : comp.kind.includes('Ground') ? 1 : 0;
      return clamp(Math.round(ph * .3 + temp * .25 + p.env * .25 + (96 - index * 5 + role) * .2), 48, 99);
    }
    function cropShape(id = st.crop) {
      const map = {
        cabai:['triangle','#c9472f'],
        terung:['circle','#6f4aa2'],
        jagung:['diamond','#d9a51e'],
        padi:['square','#9fb957'],
        singkong:['square','#8a6a3f'],
        ubi:['diamond','#b96b35'],
        tomat:['circle','#c55237'],
        kelapa:['circle','#7b5d35'],
        kedelai:['circle','#4d9b57'],
        talas:['diamond','#4d8b72']
      };
      return map[id] || ['circle', '#0d6b50'];
    }
    function companionShape(id) {
      const map = {
        jagung_sela:['diamond','#d9a51e'],
        marigold:['circle','#d7a11b'],
        zinnia:['circle','#c45a93'],
        bunga_matahari:['circle','#e0ad25'],
        kemangi:['square','#0d6b50'],
        selada:['square','#86b85b'],
        bayam:['square','#4f9b65'],
        buncis:['diamond','#5f9f58'],
        kacang_panjang:['diamond','#3f8f4c'],
        arachis:['circle','#66a43f'],
        krokot:['square','#5e9861'],
        pegagan:['circle','#54975d'],
        torenia:['circle','#7d83c9'],
        sereh:['triangle','#789d3b'],
        kubis:['square','#6ea85d']
      };
      return map[id] || ['square', '#0d6b50'];
    }
    function shapeHTML(kind, color, size = 14) {
      return `<span class="shape ${kind}" style="--c:${color};--s:${size}px"></span>`;
    }
    function setGuideStep(step) { st.guideStep = (step + 3) % 3; render(false); }
    function metricCard(value, label, score = 100, cls = 'band-white') {
      const tone = cls === 'band-red' ? '#b54141' : cls === 'band-orange' ? '#d77c28' : cls === 'band-yellow' ? '#d1a51a' : '#0d6b50';
      return `<div class="metric gauge ${cls}" style="--pct:${clamp(score,0,100)}%;--tone:${tone}">
        <div class="meter-ring"></div>
        <div><strong>${value}</strong><span>${label}</span></div>
      </div>`;
    }
    function bedMetric(value, label, score = 100, cls = 'band-white') {
      const tone = cls === 'band-red' ? '#b54141' : cls === 'band-orange' ? '#d77c28' : cls === 'band-yellow' ? '#d1a51a' : '#0d6b50';
      return `<div class="bed-metric ${cls}" style="--pct:${clamp(score,0,100)}%;--tone:${tone}"><b>${value}</b><span>${label}</span></div>`;
    }
    function bedMetricsHTML(b, p, index = 0) {
      const coord = bedCoord(b, index);
      return `<div class="bed-metrics">
        ${bedMetric(fmtPh(b.ph), 'soil pH', p.phScore, band(p.phScore).cls)}
        ${bedMetric(`${fmtPh(b.moisture)}%`, 'moisture', p.moistureScore, band(p.moistureScore).cls)}
        ${bedMetric(`${p.quality}%`, 'density', p.quality, band(p.quality).cls)}
        ${bedMetric(`${coord.lat.toFixed(4)}, ${coord.lng.toFixed(4)}`, 'coordinates', 100, 'band-white')}
      </div>`;
    }
    function spacingGuideHTML(b) {
      const p = calcBed(b);
      const compId = selectedCompanion(b);
      const comp = companionDb[compId];
      const placement = selectedPlacement(b);
      const [mainKind, mainColor] = cropShape(st.crop);
      const [compKind, compColor] = companionShape(compId);
      const mainCropName = crop().common;
      const mainCropLower = mainCropName.toLowerCase();
      const dot = (x, y, kind = mainKind, color = mainColor, size = 13, title = crop().n) =>
        `<span class="spacing-dot" style="left:${x}%;top:${y}%" title="${title}">${shapeHTML(kind, color, size)}</span>`;
      const gridLines = [30,50,70].map(x => `<span class="guide-grid-line v" style="left:${x}%"></span>`).join('') +
        [30,56,82].map(y => `<span class="guide-grid-line h" style="top:${y}%"></span>`).join('');
      const scenario = st.guideStep % 3;
      const scenarioNames = [`${mainCropName} gap`, 'Row gap', 'Companion'];
      const cropGrid = [
        [30,30], [50,30], [70,30],
        [30,56], [50,56], [70,56],
        [30,82], [50,82], [70,82]
      ];
      const mainDots = cropGrid.map(([x,y]) => dot(x,y)).join('');
      const cropOnly = `${mainDots}
        <span class="spacing-line h" style="left:30%;width:20%;top:56%"></span>

      const companionOnly = placement === 'perimeter'
        ? `<span class="companion-strip" style="left:23%;right:23%;top:7%;height:18%"></span>

        : placement === 'between'
          ? `${[30,50,70].map(x => dot(x,30)).join('')}${[30,50,70].map(x => dot(x,82)).join('')}
            ${dot(40,56,compKind,compColor,12,comp.n)}${dot(60,56,compKind,compColor,12,comp.n)}

            <span class="spacing-label" style="left:56%;top:43%">companion between rows</span>`
          : `${[30,50,70].map(x => dot(x,30)).join('')}${[30,50,70].map(x => dot(x,56)).join('')}${[30,50,70].map(x => dot(x,82)).join('')}
            ${dot(17,56,compKind,compColor,13,comp.n)}${dot(83,56,compKind,compColor,13,comp.n)}

      const scenarioBody = [cropOnly, rowOnly, companionOnly][scenario];
      const captions = [
        `Use this repeat for plant-to-plant distance inside one ${mainCropLower} row.`,
        `Use this repeat for the next ${mainCropLower} row, measured center to center.`,
        `${comp.n} uses ${placementLabel(placement).toLowerCase()} placement, so measure it separately from ${mainCropLower} spacing.`
      ];
      return `<div class="spacing-guide">

          <button class="guide-arrow" onclick="setGuideStep(${scenario - 1})" aria-label="Previous spacing guide">‹</button>

    function setField(k, v) {
      if (k === 'target') st.target = clamp(num(v, st.target), 1, 50000);
      else st[k] = v;
      saveField();
      render();
    }
    function setCrop(id) { st.crop = id; st.chosen = {}; saveField(); render(); }
    function setLayoutMode(mode) { st.layoutMode = mode; saveField(); render(); }
    function setBed(i) { st.setupBed = clamp(i, 0, st.beds.length - 1); render(); }
    function bedLabel(i) { return `${String.fromCharCode(65 + Math.floor(i / 3))}${(i % 3) + 1}`; }
    function addBed() {
      const i = st.beds.length;
      st.beds.push({id:bedLabel(i), length:7, width:1.2, ph:Number((6.2 - (i % 3) * .25).toFixed(1)), moisture:46, lat:-6.2001 - i * .0002, lng:106.8171 + i * .0002});
      st.setupBed = i;
      saveField();
      render();
    }
    function removeBed(i) {
      if (st.beds.length <= 1) return;
      delete st.chosen[st.beds[i].id];
      st.beds.splice(i,1);
      st.beds.forEach((b, idx) => b.id = bedLabel(idx));
      st.setupBed = clamp(st.setupBed, 0, st.beds.length - 1);
      st.activeBed = st.beds[0]?.id || 'A1';
      saveField();
      render();
    }
    function editBed(i, key, value) {
      const limits = key === 'length' ? [1, 200] : [0.4, 20];
      st.beds[i][key] = clamp(Math.round(num(value, st.beds[i][key]) * 100) / 100, limits[0], limits[1]);
      saveField();
      render();
    }
    function adjustBed(i, key, delta) {
      const limits = key === 'length' ? [1, 200] : [0.4, 20];
      st.beds[i][key] = clamp(Math.round((st.beds[i][key] + delta) * 100) / 100, limits[0], limits[1]);
      saveField();
      render();
    }
    function numberControl(i, key, label, unit, step) {
      const b = st.beds[i];
      return `<div class="field">

        <div class="num-control">
          <button class="stepper" onclick="adjustBed(${i},'${key}',-${step})">-</button>

    function layoutHTML(b) {
      const p = calcBed(b);
      const compId = selectedCompanion(b);
      const comp = companionDb[compId];
      const placement = selectedPlacement(b);
      const padX = p.actualX / 2;
      const padY = p.actualY / 2;
      const dots = [];
      const [mainKind, mainColor] = cropShape(st.crop);
      const [compKind, compColor] = companionShape(compId);
      const reservePerimeter = placement === 'perimeter' && p.rows > 4 && p.cols > 2;
      for (let r = 0; r < p.rows; r++) {
        for (let c = 0; c < p.cols; c++) {
          if (reservePerimeter && (r === 0 || r === p.rows - 1 || c === 0 || c === p.cols - 1)) continue;
          const x = ((padX + c * p.actualX) / (b.width * 100)) * 100;
          const y = ((padY + r * p.actualY) / (b.length * 100)) * 100;
          dots.push(`<span class="plant-dot shape-dot" style="left:${x}%;top:${y}%" title="${crop().n}">${shapeHTML(mainKind, mainColor, 13)}</span>`);
        }
      }
      const addComp = (x, y) => dots.push(`<span class="plant-dot shape-dot" style="left:${x}%;top:${y}%" title="${comp.n}">${shapeHTML(compKind, compColor, compId === 'jagung_sela' ? 16 : 12)}</span>`);
      const compEvery = Math.max(1, Math.floor(p.rows / 5));
      if (placement === 'perimeter') {
        const topEvery = Math.max(1, Math.floor(p.cols / 4));
        for (let c = 0; c < p.cols; c += topEvery) {
          const x = ((padX + c * p.actualX) / (b.width * 100)) * 100;
          addComp(x, 3);
          addComp(x, 97);
        }
        for (let r = 0; r < p.rows; r += compEvery) {
          const y = ((padY + r * p.actualY) / (b.length * 100)) * 100;
          addComp(3, y);
          addComp(97, y);
        }
      } else if (placement === 'between') {
        for (let r = 1; r < p.rows; r += 4) {
          const x = 50;
          const y = ((padY + r * p.actualY) / (b.length * 100)) * 100;
          addComp(x, y);
        }
      } else {
        for (let r = 0; r < p.rows; r += compEvery) {
          const y = ((padY + r * p.actualY) / (b.length * 100)) * 100;
          addComp(4, y);
          addComp(96, y);
        }
      }
      const aspectH = clamp((b.length / b.width) * 260, 260, 620);
      const layoutW = Math.min(360, Math.max(230, b.width / b.length * aspectH));
      return `<div class="layout-wrap">
        <div class="scale-stage">
          <div class="scale-left"><span>0m</span><span>${fmtPlain(b.length)}m</span></div>
          <div class="layout" style="--layout-w:${layoutW}px;--layout-h:${aspectH}px;--cell-x:${Math.max(6, p.actualX / (b.width * 100) * 100)}%;--cell-y:${Math.max(3, p.actualY / (b.length * 100) * 100)}%">
            ${dots.join('')}
          </div>
          <div class="scale-bottom"><span>0m</span><span>${fmtPlain(b.width)}m</span></div>
        </div>
      </div>
      <div class="legend">
        <span class="chip">${shapeHTML(mainKind, mainColor, 10)} ${crop().n}: ${p.actualX}x${p.actualY} cm</span>
        <span class="chip">${shapeHTML(compKind, compColor, 10)} ${comp.n}: ${placementLabel(placement)}</span>
        <span class="chip">Scale ${fmtPlain(b.width)}m x ${fmtPlain(b.length)}m</span>
      </div>`;
    }

                </div>
                ${bedMetricsHTML(b, p, index)}
              </button>`;
            }).join('')}
          </div>
          <div class="panel stack">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <h2>Bed ${st.activeBed}</h2>
              <span class="chip">real scale</span>
            </div>
            ${layoutHTML(st.beds.find(b => b.id === st.activeBed) || st.beds[0])}
          </div>
        </div>
      </section>`;
    }
    function T_beds() {
      return `<section>
        <div class="top"><h1>Bed details</h1><p class="sub">Each bed keeps independent size, pH, moisture, companion, and scale output.</p></div>
        <div class="section stack">
          ${st.beds.map(b => {
            const p = calcBed(b);
            return `<div class="panel stack">
              <div style="display:flex;justify-content:space-between;align-items:center"><h2>Bed ${b.id}</h2><span class="chip">${fmtPlain(b.width)}m x ${fmtPlain(b.length)}m</span></div>
              <div class="metric-row">
                <div class="metric"><strong>${p.count}</strong><span>main plants</span></div>
                <div class="metric ${band(p.quality).cls}"><strong>${p.quality}%</strong><span>density</span></div>
                <div class="metric ${band(p.env).cls}"><strong>${p.env}%</strong><span>environment</span></div>
              </div>
              ${spacingGuideHTML(b)}
              ${layoutHTML(b)}
            </div>`;
          }).join('')}
        </div>
      </section>`;
    }
    function T_sensor() {
      return `<section>
        <div class="top"><h1>Live sensor</h1><p class="sub">MQTT data updates the environmental scoring without changing the registered bed dimensions.</p></div>
        <div class="section stack">
          ${[
            ['Air temp', `${fmtPh(live.temp_air)}°C`, '🌡️'],
            ['Air humidity', `${fmtPh(live.hum_air)}%`, '💧'],
            ['Soil moisture', `${fmtPh(live.hum_soil)}%`, '〰️'],
            ['Soil pH', fmtPh(live.ph_soil), '🧪']
          ].map(m => `<div class="panel" style="display:flex;align-items:center;gap:14px">
            <div class="crop-icon" style="margin:0">${m[2]}</div><div><h2>${m[1]}</h2><p class="sub">${m[0]}</p></div>
          </div>`).join('')}
        </div>
      </section>`;
    }
    function T_settings() {
      return `<section>
        <div class="top"><h1>Settings</h1><p class="sub">Field setup can be adjusted any time and the layout will recompute from the database.</p></div>
        <div class="section stack">
          <button class="btn secondary" onclick="nav('field')">Edit crop and target</button>
          <button class="btn secondary" onclick="nav('beds')">Edit bedengan sizes</button>
          <button class="btn ghost" onclick="nav('login')">Sign out</button>
        </div>
      </section>`;
    }

    function render(resetScroll = true) {
      const scr = document.getElementById('scr');
      const navEl = document.getElementById('bottom-nav');
      navEl.classList.toggle('show', st.screen === 'main');
      document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === st.tab || (btn.dataset.tab === 'dashboard' && st.tab === 'bed')));
      const screens = {login:S_login, field:S_field, beds:S_beds, scan:S_scan, soil:S_soil, companion:S_companion};
      if (screens[st.screen]) scr.innerHTML = screens[st.screen]();
      else {
        const tabs = {dashboard:T_dashboard, beds:T_beds, sensor:T_sensor, settings:T_settings};
        scr.innerHTML = (tabs[st.tab] || T_dashboard)();
      }
      if (resetScroll) scr.scrollTop = 0;
      const now = new Date();
      document.getElementById('clock').textContent = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
    }

    function setupMQTT() {
      if (!window.mqtt) return;
      try {
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt', {clientId:'polyfarm_' + Math.random().toString(16).slice(2), reconnectPeriod:2500});
        client.on('connect', () => {
          document.getElementById('mqtt-dot').className = 'mqtt-dot ok';
          client.subscribe('hackviet/data/sensors');
          client.subscribe('hackviet/data/gps');
        });
        client.on('error', () => document.getElementById('mqtt-dot').className = 'mqtt-dot err');
        client.on('message', (topic, msg) => {
          try {
            const d = JSON.parse(msg.toString());
            if (topic.includes('sensors')) {
              ['temp_air','hum_air','hum_soil','ph_soil'].forEach(k => { if (d[k] != null) live[k] = Number(d[k]); });
              live.ts = d.timestamp || live.ts;
              if (st.screen === 'main') render(false);
            }
            if (topic.includes('gps')) { live.lat = d.lat ?? live.lat; live.long = d.long ?? live.long; }
          } catch(e) {}
        });
      } catch(e) {}
    }

    setInterval(() => {
      const now = new Date();
      document.getElementById('clock').textContent = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
    }, 30000);
    setupMQTT();
    render();
  </script>
</body>
</html>
