<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AgriDash</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-box">
        <div class="logo">
            <i class="ph ph-plant"></i>
            <span>AgriDash</span>
        </div>
        <p>Sistem Cerdas Pemantauan Lahan Pertanian</p>
        
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" class="form-input" placeholder="petani@agridash.com" value="petani@agridash.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-input" placeholder="••••••••" value="password123">
        </div>
        
        <a href="devices.html" class="btn-primary">Masuk ke Dashboard</a>
    </div>
</body>
</html>
